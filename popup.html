<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="brand-logo" src="icons/icon128.png" alt="QuickTranslate logo">
      <h1>QuickTranslate</h1>
      <span class="version">v1.0</span>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="statusText">就绪</span>
      <span id="progressText"></span>
    </div>

    <div class="actions">
      <button id="btnTranslate" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1"/>
          <path d="M13 14l4 6 5-10"/>
        </svg>
        翻译网页
      </button>
      <button id="btnRestore" class="btn btn-secondary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        显示原文
      </button>
    </div>

    <div class="settings">
      <div class="setting-row">
        <label for="provider">翻译服务</label>
        <select id="provider">
          <option value="google">Google 翻译 (免费)</option>
          <option value="deepseek">DeepSeek API</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="targetLang">目标语言</label>
        <select id="targetLang">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="translateMode">网页翻译范围</label>
        <select id="translateMode">
          <option value="lazy">懒加载翻译（推荐）</option>
          <option value="all">整页一次翻译</option>
        </select>
      </div>

      <label class="checkbox-row" for="selectionTranslateEnabled">
        <input type="checkbox" id="selectionTranslateEnabled">
        <span>启用划译</span>
      </label>

      <label class="checkbox-row" for="autoTranslate">
        <input type="checkbox" id="autoTranslate">
        <span>自动翻译</span>
      </label>
    </div>

    <div class="deepseek-config" id="deepseekConfig" style="display:none;">
      <div class="setting-row">
        <label for="apiKey">DeepSeek API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      </div>
    </div>

    <div class="footer">
      <button id="btnOptions" class="btn-link">详细设置</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
